<body>

<header class="site-header">

</header>

<nav class="nav">

<main class="container">

  <section class="form-box">
    <h2>Score Lookup</h2>

    <label for="lookupStudentCode">Student code</label>
    <input type="text" id="lookupStudentCode" placeholder="Example: B1A01">

    <label for="lookupPin">PIN</label>

  <section id="scoreResults"></section>
