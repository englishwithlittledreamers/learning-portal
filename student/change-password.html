<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Change Password - Little Dreamers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<main class="container">

  <section class="form-box">
    <h1>Change Your Password</h1>
    <p>Please choose a new password for your account.</p>

    <label for="newPassword">New password</label>
    <input type="password" id="newPassword" placeholder="At least 8 characters">

    <label for="confirmPassword">Confirm new password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your password">

    <button onclick="changePassword()">Change Password</button>
    <button onclick="logout()">Logout</button>
  </section>

  <section id="message"></section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>

<script>
let currentProfile = null;

document.addEventListener("DOMContentLoaded", async () => {
  const auth = await requireRole(["student"]);
  if (!auth) return;
  currentProfile = auth.profile;
});

async function changePassword() {
  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const message = document.getElementById("message");

  if (newPassword.length < 8) {
    alert("Password should be at least 8 characters.");
    return;
  }

  if (newPassword !== confirmPassword) {
    alert("Passwords do not match.");
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    password: newPassword
  });

  if (error) {
    message.innerHTML = `<div class="result-box"><p class="error">${error.message}</p></div>`;
    return;
  }

  await fetch("/api/mark-password-changed", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${(await supabaseClient.auth.getSession()).data.session.access_token}`
    }
  });

  message.innerHTML = `
    <div class="result-box">
      <p class="success">Password changed successfully.</p>
      <button onclick="window.location.href='/student/dashboard.html'">Go to Dashboard</button>
    </div>
  `;
}
</script>

</body>
</html>
