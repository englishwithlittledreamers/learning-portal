<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>My Scores - Little Dreamers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <h1>My Scores</h1>
  <p>View your previous test results.</p>
</header>

<nav class="nav">
  <a href="/student/dashboard.html">Dashboard</a>
  <a href="/student/lessons.html">Lessons</a>
  <a href="/student/tests.html">Tests</a>
  <button onclick="logout()">Logout</button>
</nav>

<main class="container">
  <section id="results"></section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const auth = await requireRole(["student"]);
  if (!auth) return;

  const { data, error } = await supabaseClient
    .from("test_results")
    .select("submitted_at, test_name, course, skill, correct_answers, total_questions, score, wrong_answers")
    .order("submitted_at", { ascending: false });

  const container = document.getElementById("results");

  if (error) {
    container.innerHTML = `<p class="error">${error.message}</p>`;
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = `<div class="result-box"><p>No scores yet.</p></div>`;
    return;
  }

  let html = `
    <table class="score-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Test</th>
          <th>Skill</th>
          <th>Correct</th>
          <th>Score</th>
          <th>Wrong Answers</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(row => {
    const wrong = Array.isArray(row.wrong_answers)
      ? row.wrong_answers.join(", ")
      : "";

    html += `
      <tr>
        <td>${new Date(row.submitted_at).toLocaleString()}</td>
        <td>${row.test_name}</td>
        <td>${row.skill || ""}</td>
        <td>${row.correct_answers}/${row.total_questions}</td>
        <td>${row.score}/10</td>
        <td>${wrong || "None"}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
});
</script>

</body>
</html>
